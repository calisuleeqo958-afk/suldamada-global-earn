<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suldamada Global</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app-container { width: 90%; max-width: 400px; background: #18181b; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; border: 1px solid #333; }
        .balance-card { background: linear-gradient(135deg, #6366f1, #a855f7); padding: 25px; border-radius: 20px; margin-bottom: 25px; }
        .balance-val { font-size: 2.5rem; font-weight: bold; margin: 10px 0; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px; border: none; background: #27272a; color: white; text-align: center; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; color: white; transition: 0.3s; }
        .btn-game { background: #3b82f6; }
        .btn-ad { background: #8b5cf6; }
        .btn-withdraw { background: #10b981; }
    </style>
</head>
<body>
    <div class="app-container">
        <h2>Suldamada Global</h2>
        <div class="balance-card">
            <p style="margin:0; opacity:0.8">Haraagaaga</p>
            <div class="balance-val">$<span id="balance">32.75</span></div>
        </div>
        
        <button class="btn btn-game" onclick="playGame()">🎮 Play Game & Win $8.50</button>
        <button class="btn btn-ad" id="adBtn" onclick="watchAd()">📺 Watch Ad & Earn $5.50</button>
        
        <input type="text" id="phone" placeholder="Geli lambarkaaga">
        
        <button class="btn btn-withdraw" onclick="sendWithdraw()">Withdraw Balance</button>
    </div>

    <script>
        function playGame() {
            alert("Ciyaartu way socotaa... Fadlan sug natiijada!");
            setTimeout(() => {
                if (Math.random() > 0.6) {
                    let b = document.getElementById('balance');
                    b.innerText = (parseFloat(b.innerText) + 8.50).toFixed(2);
                    alert("Hambalyo! Waxaad ku guulaysatay $8.50!");
                } else {
                    alert("Nasiib xumo! Ciyaartii waa lagaa adkaaday.");
                }
            }, 3000);
        }

        function watchAd() {
            window.open("https://omg10.com/4/11075110", "_blank");
            setTimeout(() => {
                let b = document.getElementById('balance');
                b.innerText = (parseFloat(b.innerText) + 5.50).toFixed(2);
                alert("Waad daawatay! $5.50 ayaa laguugu daray.");
            }, 10000);
        }

        async function sendWithdraw() {
            let b = document.getElementById('balance').innerText;
            let p = document.getElementById('phone').value;
            if (parseFloat(b) < 50) { alert("Waa inaad gaartaa $50 si aad lacag ula baxdo."); return; }
            if (p.length < 5) { alert("Fadlan geli lambar sax ah."); return; }
            alert("Codsigaaga $" + b + " lambarka " + p + " waa la gudbiyay.");
        }
    </script>
</body>
</html>
