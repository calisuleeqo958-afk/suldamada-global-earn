
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Suldamada Global</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .app-container { width: 100%; max-width: 400px; background: #1e293b; padding: 25px; border-radius: 30px; text-align: center; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 50px; border: none; cursor: pointer; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="app-container">
        <h1>$<span id="balance">32.75</span></h1>
        <button class="btn" style="background:#2563eb" onclick="addBal(2)">Play Game +$2</button>
        <button class="btn" style="background:#6366f1" onclick="addBal(5.5)">Watch Ad +$5.5</button>
        <input type="text" id="phone" placeholder="Geli lambarka">
        <button class="btn" style="background:#10b981" onclick="withdraw()">Withdraw</button>
    </div>
    <script>
        function addBal(amt) {
            let b = document.getElementById('balance');
            b.innerText = (parseFloat(b.innerText) + amt).toFixed(2);
        }
        async function withdraw() {
            let b = document.getElementById('balance').innerText;
            let p = document.getElementById('phone').value;
            if(parseFloat(b) < 50) { alert("Ugu yaraan $50"); return; }
            alert("Codsigaaga $"+b+" lambarka "+p+" waa la diray.");
        }
    </script>
</body>
</html>
