
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suldamada Global - System</title>
    <!-- Halkan ku dheji Script-ka xayeysiiska (Ad Network) marka aad hesho -->
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .app-container { width: 100%; max-width: 400px; }
        .balance-card { background: linear-gradient(135deg, #ff5e00, #ff0055); padding: 25px; border-radius: 16px; margin-bottom: 20px; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #161b22; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; color: white; }
        .btn-ad { background: #6366f1; }
        .btn-evc { background: #008037; }
        .btn-mpesa { background: #4caf50; }
        .btn-visa { background: #1e3a8a; }
        .btn-binance { background: #f59e0b; }
    </style>
</head>
<body>
    <div class="app-container">
        <h2>Suldamada Global</h2>
        <div class="balance-card">
            <p>Haraagaaga</p>
            <h1>$<span id="balance">27.25</span></h1>
        </div>
        
        <!-- Xayeysiis: Halkan waxaa ka muuqan doona xayeysiiska rasmiga ah -->
        <button class="btn btn-ad" onclick="watchAd()">Watch Ad to Earn $5.50</button>
        
        <input type="text" id="phone" placeholder="Geli lambarkaaga ama ID-gaaga">
        
        <button class="btn btn-evc" onclick="withdraw('EVC Plus')">Withdraw EVC Plus</button>
        <button class="btn btn-mpesa" onclick="withdraw('M-Pesa Kenya')">Withdraw M-Pesa</button>
        <button class="btn btn-visa" onclick="withdraw('Visa')">Withdraw Visa</button>
        <button class="btn btn-binance" onclick="withdraw('Binance Pay')">Withdraw Binance Pay</button>
    </div>

    <script>
        let currentBalance = 27.25;
        
        function watchAd() {
            // Halkan waxaa lagu beddeli karaa function-ka rasmiga ah ee xayeysiiska
            alert("Xayeysiiska waa la bilaabay, fadlan sug 3 ilbiriqsi...");
            setTimeout(() => {
                currentBalance += 5.50;
                document.getElementById('balance').innerText = currentBalance.toFixed(2);
                alert("Hambalyo! $5.50 ayaa lagu daray haraagaaga.");
            }, 3000);
        }

        function withdraw(method) {
            let phone = document.getElementById('phone').value;
            if (phone.length < 5) {
                alert("Fadlan geli lambar ama ID sax ah!");
            } else {
                alert("Mahadsanid! Codsigaaga " + method + " ee " + phone + " waa la gudbiyay. Maamulka ayaa kula soo xiriiri doona.");
            }
        }
    </script>
</body>
</html>
