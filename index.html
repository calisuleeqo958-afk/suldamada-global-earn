
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Suldamada Global</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app-container { width: 100%; max-width: 400px; background: #1e293b; padding: 25px; border-radius: 30px; }
        .balance-card { background: linear-gradient(135deg, #f59e0b, #ec4899); padding: 30px; border-radius: 25px; text-align: center; margin-bottom: 25px; }
        input { width: 100%; padding: 18px; margin-bottom: 20px; border-radius: 50px; border: none; background: #0f172a; color: white; text-align: center; }
        .btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; color: white; text-decoration: none; display: block; text-align: center; }
        .btn-ad { background: #6366f1; margin-bottom: 20px; }
        
        /* Badhanada lacag bixinta oo markii hore la qarinayo */
        .withdraw-group { display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <h2 style="text-align:center">Suldamada Global</h2>
        <div class="balance-card">
            <p>Haraagaaga</p>
            <h1>$<span id="balance">32.75</span></h1>
        </div>
        
        <a href="https://omg10.com/4/11075110" target="_blank" class="btn btn-ad" onclick="addMoney()">Watch Ad to Earn $5.50</a>
        
        <input type="text" id="phone" placeholder="Geli lambarkaaga ama ID-gaaga">
        
        <div id="withdrawGroup" class="withdraw-group">
            <button class="btn" style="background:#10b981" onclick="finalWithdraw('EVC Plus')">Withdraw EVC Plus</button>
            <button class="btn" style="background:#ec4899" onclick="finalWithdraw('M-Pesa')">Withdraw M-Pesa</button>
            <button class="btn" style="background:#3b82f6" onclick="finalWithdraw('Visa')">Withdraw Visa</button>
            <button class="btn" style="background:#f59e0b" onclick="finalWithdraw('Binance')">Withdraw Binance</button>
        </div>
    </div>

    <script>
        function addMoney() {
            let balanceEl = document.getElementById('balance');
            let balance = parseFloat(balanceEl.innerText);
            balance += 5.50;
            balanceEl.innerText = balance.toFixed(2);
            
            // Hubi haddii uu gaaray $50 si loo soo bandhigo badhanada
            if (balance >= 50) {
                document.getElementById('withdrawGroup').style.display = 'block';
            }
        }

        function finalWithdraw(method) {
            let phone = document.getElementById('phone').value;
            if (phone.length < 5) {
                alert("Fadlan geli lambar sax ah.");
            } else {
                alert("Mahadsanid! Codsigaaga " + method + " ee " + phone + " waa la gudbiyay.");
            }
        }
    </script>
</body>
</html>
