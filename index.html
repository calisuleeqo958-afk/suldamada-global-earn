
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Suldamada Global</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app-container { width: 100%; max-width: 400px; background: #1e293b; padding: 25px; border-radius: 30px; }
        .balance-card { background: linear-gradient(135deg, #f59e0b, #ec4899); padding: 30px; border-radius: 25px; text-align: center; margin-bottom: 25px; }
        input { width: 100%; padding: 18px; margin-bottom: 20px; border-radius: 50px; border: none; background: #0f172a; color: white; text-align: center; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; color: white; text-decoration: none; display: block; text-align: center; }
        .btn-ad { background: #6366f1; }
        .btn-withdraw { background: #10b981; }
    </style>
</head>
<body>
    <div class="app-container">
        <h2 style="text-align:center">Suldamada Global</h2>
        <div class="balance-card">
            <p>Haraagaaga</p>
            <h1>$<span id="balance">32.75</span></h1>
        </div>
        
        <a href="https://omg10.com/4/11075110" target="_blank" class="btn btn-ad" onclick="addMoney()">Watch Ad to Earn $5.50</a>
        
        <input type="text" id="phone" placeholder="Geli lambarkaaga">
        
        <button class="btn btn-withdraw" onclick="checkWithdraw()">Withdraw Money</button>
    </div>

    <script>
        function addMoney() {
            let balanceEl = document.getElementById('balance');
            let balance = parseFloat(balanceEl.innerText);
            balance += 5.50;
            balanceEl.innerText = balance.toFixed(2);
        }

        function checkWithdraw() {
            let balance = parseFloat(document.getElementById('balance').innerText);
            let phone = document.getElementById('phone').value;

            // Halkan ayaan ku xirnay lacagta:
            if (balance < 50) {
                alert("Waan ka xunnahay! Lacagta ugu yar ee la bixi karo waa $50. Sii wad daawashada xayeysiiska.");
            } else if (phone.length < 5) {
                alert("Fadlan geli lambar sax ah.");
            } else {
                alert("Hambalyo! Codsigaaga lacag bixinta waa la gudbiyay.");
            }
        }
    </script>
</body>
</html>
