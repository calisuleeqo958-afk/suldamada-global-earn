
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suldamada Global</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app-container { width: 100%; max-width: 400px; background: #1e293b; padding: 20px; border-radius: 20px; }
        .balance-card { background: linear-gradient(45deg, #f59e0b, #ec4899); padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        
        /* Halkan ayaan ku saxay badhanka xayaysiiska */
        .btn-ad { background: #8b5cf6; width: 100%; padding: 18px; border-radius: 12px; border: none; color: white; font-weight: bold; cursor: pointer; text-decoration: none; display: block; text-align: center; margin-bottom: 15px; font-size: 16px; }
        
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: none; background: #334155; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; color: white; }
        .btn-evc { background: #10b981; }
        .btn-mpesa { background: #f472b6; }
        .btn-visa { background: #3b82f6; }
        .btn-binance { background: #f59e0b; }
    </style>
</head>
<body>
    <div class="app-container">
        <h2 style="text-align:center">Suldamada Global</h2>
        <div class="balance-card">
            <p>Haraagaaga</p>
            <h1>$<span id="balance">32.75</span></h1>
        </div>
        
        <!-- Badhanka Xayaysiiska oo hadda fidsan -->
        <a href="https://omg10.com/4/11075110" target="_blank" class="btn-ad">Watch Ad to Earn $5.50</a>
        
        <input type="text" id="phone" placeholder="Geli lambarkaaga ama ID-gaaga">
        
        <button class="btn btn-evc" onclick="alert('Codsigaaga waa la gudbiyay')">Withdraw EVC Plus</button>
        <button class="btn btn-mpesa" onclick="alert('Codsigaaga waa la gudbiyay')">Withdraw M-Pesa</button>
        <button class="btn btn-visa" onclick="alert('Codsigaaga waa la gudbiyay')">Withdraw Visa</button>
        <button class="btn btn-binance" onclick="alert('Codsigaaga waa la gudbiyay')">Withdraw Binance Pay</button>
    </div>
</body>
</html>
